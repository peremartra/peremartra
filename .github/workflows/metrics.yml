name: Metrics
on:
  # Se actualiza cada 24 horas
  schedule: [{cron: "0 0 * * *"}]
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:
  # Se actualiza cada vez que haces un push a la rama principal
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Tu token guardado en Secrets
          token: ${{ secrets.METRICS_TOKEN }}

          # Configuración visual
          user: peremartra
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Madrid
          
          # Plugins extras (puedes activar más luego)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_lines: yes
